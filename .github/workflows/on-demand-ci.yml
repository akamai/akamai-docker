name: On Demand CI
run-name: "On Demand CI - Variants: '${{ inputs.variants || 'All' }}' | Tests: '${{ inputs.tests || 'All' }}'"

on:
  workflow_dispatch:
    inputs:
      variants:
        description: |
          A single image name to build (dependency chain is resolved automatically).
          Leave empty to build all variants from the variants file.
          To build multiple images, use the shell syntax: "shell:terraform,api-gateway".
          Example: "purge" builds purge.
          Example: "shell:terraform,api-gateway" builds shell with only terraform and api-gateway.
        required: false
        default: ''
      tests:
        description: |
          Comma-separated list of tests to run (matched by Bats --filter regex).
          Leave empty to run all tests.
          Use "none" to skip tests entirely.
          Example: "appsec,dns" runs only tests whose name matches appsec or dns.
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Print inputs
        run: |
          echo "========================================="
          echo "Workflow Execution Inputs"
          echo "========================================="
          echo "Variants : ${{ inputs.variants || 'All (Default)' }}"
          echo "Tests    : ${{ inputs.tests || 'All (Default)' }}"
          echo "========================================="
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run unit tests for test_build.py
        run: |
          pip install pytest -q
          python3 -m pytest scripts/test_build.py -v
        shell: bash

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        env:
          VARIANTS: ${{ inputs.variants }}
        run: |
          if [ -z "$VARIANTS" ]; then
            echo "No variants specified — building all from variants file"
            ./scripts/build-all.sh
          else
            echo "Building selected images"
            python3 scripts/build.py "$VARIANTS"
          fi
        shell: bash

      - name: Run tests
        if: ${{ inputs.tests != 'none' }}
        env:
          TESTS: ${{ inputs.tests }}
        run: |
          if [ -n "$TESTS" ]; then
            # Convert comma-separated list to pipe-separated regex, trimming whitespaces
            export BATS_FILTER="$(echo "$TESTS" | sed 's/[[:space:]]*,[[:space:]]*/|/g; s/^[[:space:]]*//; s/[[:space:]]*$//')"
          fi
          ./scripts/test.sh
        shell: bash
